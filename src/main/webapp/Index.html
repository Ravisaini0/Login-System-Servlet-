<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Website</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      background-color: #f4f6f9;
      font-family: 'Poppins', sans-serif;
    }
    .navbar {
      background-color: #083766;
    }
    .navbar-brand, .nav-link {
      color: #fff !important;
    }
    .hero {
      height: 80vh;
      background: linear-gradient(to right, #003366, #004c99);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }
    .btn-custom {
      border-radius: 30px;
      padding: 10px 25px;
      font-size: 18px;
    }
    footer {
      background-color: #003366;
      color: white;
      text-align: center;
      padding: 15px 0;
      margin-top: 30px;
    }
  </style>
  
</body>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">MyBank</a>
      <ul class="nav content-end">
  <li class="nav-item">
    <a class="nav-link active" aria-current="page" href="#">Home</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="#">Internet banking</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="#">About us</a>
  </li>
  <li class="nav-item">
    <a class="nav-link " href="#" >Support</a>
  </li>
</ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
 <!-- <img src="img/Wedding-Event.webp" alt="Logo">  -->
 
 
 

 
    <h1 class="display-4 fw-bold">Welcome to MyBank</h1>
    <p class="lead">Your trusted partner in digital banking.</p>
    <div class="mt-2"> <a href="login.html" class="btn btn-light  me-2">Login</a></div>
    
    <div class="mt-2">
      <button class="btn btn-warning btn-custom" data-bs-toggle="modal" data-bs-target="#registerModal">Register</button>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    © 2025 MyBank. All Rights Reserved.
  </footer>


  <!-- Register Modal -->
  <div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Register</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form action="Registrations" method="post" enctype="multipart/form-data">
           <input type="file" name="image" accept="image/*" required>
  
            <div class="mb-3">
              <label>Full Name</label>
              <input type="text" class="form-control" placeholder="Enter your name" name="uname" required>
            </div>
            <div class="mb-3">
              <label>Email address</label>
              <input type="email" class="form-control" placeholder="Enter your email" name="email" required>
            </div>
            <div class="mb-3">
              <label>Password</label>
              <input type="password" class="form-control" placeholder="Create a password" name="password" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Register</button>
          </form>
        </div>
      </div>
    </div>
  </div>


 
</html>

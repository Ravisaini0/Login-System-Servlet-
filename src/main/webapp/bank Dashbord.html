<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f6f9;
      font-family: 'Poppins', sans-serif;
    }
    .navbar {
      background-color: #003366;
    }
    .navbar-brand, .nav-link {
      color: #fff !important;
    }
    .card {
      border-radius: 15px;
      box-shadow: 0px 3px 8px rgba(0,0,0,0.2);
    }
    .logout-btn {
      background-color: #dc3545;
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 5px;
      cursor: pointer;
    }
    .logout-btn:hover {
      background-color: #b52a37;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="#">MyBank Dashboard</a>
    <div class="ms-auto">
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<!-- Dashboard Content -->
<div class="container mt-5">
  <div class="card p-4">
	   <h3 id="welcomeText">Welcome, ${sessionScope.username}</h3>
		<p class="text-muted">Email: ${sessionScope.email}</p>

    <hr>
    <h4>Your Account Balance:</h4>
    <h2 class="text-success">₹25,000.00</h2>

    <hr>
    <h5>Recent Transactions</h5>s
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>2025-11-01</td>
          <td>Salary Credited</td>
          <td class="text-success">+ ₹20,000.00</td>
        </tr>
        <tr>
          <td>2025-10-30</td>
          <td>Electricity Bill</td>
          <td class="text-danger">- ₹1,200.00</td>
        </tr>
        <tr>
          <td>2025-10-28</td>
          <td>Online Shopping</td>
          <td class="text-danger">- ₹3,800.00</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // Example JavaScript: logout function
  function logout() {
    alert("You have been logged out!");
    window.location.href = "login.html"; // Go back to login page
  }
</script>

</body>
</html>
